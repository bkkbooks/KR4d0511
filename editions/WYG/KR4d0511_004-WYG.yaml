body:
  text: 積齋集卷四元程端學撰記東湖書院記鄞城東三十里有湖焉山圍而獻秀水皛而光浮舟行若乗氣凌空不知身在塵世也其址有谷曰鄮麓土腴物阜居民鱗集余少時嘗從友仁孫先生講學其中欲結居讀書以領湖山之勝顧南北驅馳未遑也池陽阮侯申之之尹鄞也興學尊師以為治陸君天祐有子曰某曰某感其尹之化而思其父之遺命即其地築義塾奉紫陽朱子像以教一鄉之子弟講有席息有榻與凡庖湢之所食飲之器雖微而完既又割田一百有五十畝為報祀廩餼之須淛帥王公名之曰東湖書院堂曰育英為書大字以榜之嘉其志也於是阮侯延吳君思永端席設講招賢訓導陳君某專其教復介余友趙君垕孫君俞叔來謁余又以示夫斆且學者使知勗焉余謂世人負千金貲出所贏崇佛老舍以邀福田利益今陸氏不及中人之産乃能殫力以淑其鄉人其志未可與時俗語也且其事有感於余心者乃為識其本末而告之曰古今之學不異而其效不迨於古者盍思其故哉古者二十五家即有兩塾黨術有庠序國復有學民無貴賤皆得受業今之州縣學若書院非士類不入而農工商賈無所於肄古者自洒掃應對至於窮理存養小大有序食息起居莫非為學其修於家者皆出而經國理民之本今之學者句讀未分已事割裂裝綴鬭靡之習肆然自侈其所長而不知無所用之嗟乎義利不明為人為己莫辨而後天下無全才為師者以是教其徒父兄以是令其子弟人生而蒙枉其路而塞其明奈之何其有造也然則凡遊此塾者必洗其陋必圖其新學朱子之學而不徒像設為尊師之具豈惟一鄉之幸歟上都國子監題名記泰定二年四月十一日將仕郎國子助教程端學以諸生隨駕至上都學録王琰伴讀張汝遴裴士完顔恪楊鉅在行十九日開學七月二十六日南還余之來也見學舍新美而器物有未備者言諸御史臺中書工部留守司得木及工為牆以限内外為門以謹出入為棧閣以禦濕為座榻以即安復言諸集賢院中書省中書刑部得官奴以充守者其未備者則待後之人因登諸生而告之曰君子之居也一日必葺有司之事不敢不勉學者欲徳之有諸躬也非可取具一時如此役者然猶經營攻治之久而後有成况學乎觀此亦可知所警矣此行也治書侍御史蔡公逢原厲意學校故克有濟國子司業虞公伯生仍以進講經筵同寓斯堂將行改除祕書少監云七月既望記文安侯祠堂記中大夫祕書卿上輕車都尉封陳留郡諡文安阮侯至元二十有一年同知慶元路總管府事有能聲尤殫力庠校士民徳之厥後鬱攸熛延鄞學榱楹僅復而瓴甓缺焉泰定元年冬侯之子某來尹鄞謁先聖於學周視喟然曰昔先君涖是邦以興學為施政首令庳陋若是責不在我耶計租入廩餼外無贏乃捐己俸裁冗費規貨財僦工役權力考宜大修殿堂齋廡櫺星儀門漸次繕完創校官廳壘石為垣塗塈黝堊粲然峻整又塑從祀像鑄銅為罍爵且懼異日葺補莫繼城西一里而近有沮洳可田募民耕之得一百二十有五畝白同僚請會府歸之於學學舊有田占於豪右案籍復之久蕪不治招徠闢之歳復益粟若干石六歳之間不辭焦勞底於訖功教諭永嘉吳思永實承其事既鄞之士感而相謂曰學孰為大教養為大來者無居教不可施歳入無幾養不可為今吾尹既廣厥居又厚其入以惠我士類昧所報可乎將為尹建生祠於學尹聞而謝曰職分在焉又先君之志敢有其功乎請益力而辭益固則又相謂曰尹以先君子之志而不居其功盍祠文安以旌之或曰文安遺愛在一邦獨邑庠祠之其若尹之功何曰古者稱人必本其父兄師友矧吾儕嘗均沐文安之澤而尹以繼述為務揆所元而演其澤於無窮以明尹之志誰曰不宜於是即堂之東偏為祠以奉焉尹弗能止也祠成屬筆於端學以刻石示後鄞余桑梓之邑雖欲辭不得而辭侯諱某字某池陽人以若山自號云環秀亭記淛西財賦都府率以雜職任其事邇者朝廷欲清其源往往以憲臺官居之於是前燕南廉訪使義甫魏公為都府總管然常情終以輟近侍去清要怏怏思代公獨曰錢榖甲兵皆吾分内天下事非彼為則我為我居清流誰任其濁怡然就職正已帥下會計必當出納必均庶務既理則以其餘暇登高望逺適情玩物若自得焉所寓官舍之後作小亭以臨大江其東西樹林蓊蔚晝隂夏涼北依吳山若屏障欄繞南則潮汐往來颿檣追逐越嶲吳境獻奇效技於一寓目之間如凌清氣出人寰下瞰培塿而不知身在兹亭也至順三年秋余校文江西道錢塘訪公寓所飲於亭中握手道故舊極歡坐見暮色自江山來而忘其去於時亭初成公請名且屬余記之因名曰環秀而為之言曰山川勝槩有遺乎古而顯乎今者非天之啓閉異狀也以吾自得之趣契彼之勝云爾勝槩無盡而趣有淺深故有淪沒於平日而發越於一時者以公之齊物我一得失斯能排紛擾而處優游掃塵囂而接清曠隨所在而樂其天也曩某獲侍公於朝知公為悉故喜為書之以告夫登斯亭者庶有以識公之心非直為臨眺之美而已也定海石塘記四明郡東北六十里有邑曰定海邑治東北可三里即際大海颶風怒濤奔駛衝突或破民廬官舍宋淳熙四年江海為一幾不可邑先是防以土木歳輒潰決䕶以版石與潮俱去淳熙十六年明守岳甫言於朝出官緡命通判林桷統制王彦舉統領董珍築石塘六百有五丈高十有一層下廣上斂石厚一尺敷平倍之從横布置如畫棊局奠其址以巨木實其背以厚土殺其勢以萬樁設常法以時修繕俾勿壊水患既平邑以敉寧厥後有司失於修舉塘漸圯不支至大三年完顔公某來守是邦乃大修之財出於民而不告勞備禦堅緻視舊有加民咸徳之後十有八年公復帥淛閫鎮四明巡行疆土覽舊跡之具存懼前功之莫續慨然增感塘舊有碑宋太守林栗撰載其本末頗悉歳久而仆慮莫考所元乃來請文將刻石示後余聞故老言有塘以扞其衝斯可以邑有邑以翰其外斯可以郡然則兹塘非直一邑之衞實一郡之藩其績為大然智者防其未然常人救於既著岳守創之公復葺之使繼繼承承少罅必補雖微顯功可底永久苟患至而圖將何及焉此公之所以拳拳於兹久而不忘者也吁天下之事皆然豈惟兹塘也哉是為記至順元年九月望日記瑞州路推廳記希古王君宗彞李君為瑞陽郡推官李君名其所署之廳曰明誠王君書二大字掲之楣間予適領郡幕事請予記之辭既不獲為之言曰明誠之名本諸子思子自誠明之言乎原其義若不相似者蓋子思子以學而此以治也論學則先明後誠論治則誠體明用此其異也舜命臯陶曰汝作士惟明克允夫兩造具備情偽混淆非明莫簡其孚跡與情殊辭有辯訥非明莫燭其微犯有過故服有重輕非明莫持其平作法有限事變無窮非明莫審其權理官之職舍明何以哉然豈徒察察發擿鉤距求情為明哉有誠焉為之體也夫刑者弼五教之具古之聖人教民父子親君臣義夫婦别長幼序朋友信不率則刑以一之非恃刑以明亦非恃刑以治也有民不教則五品不遜而有訟訟而刑末矣孔子曰必也使無訟乎又曰刑期於無刑夫聽訟而使無訟用刑而期無刑其道安在亦曰以吾真實無妄之心達之於彼彼將誠服而凡隱微潛伏之狀自不可掩故始不免訟而卒無訟始不免刑而卒無刑無訟無刑教法乃洽唐虞三代刑措不用非以是哉秦漢以降舍教任刑自申韓倡刑名之學天下宗之律愈嚴而弊愈生刑愈濫而姦愈作深文危法民無措躬廷尉如張釋之天下無寃民于定國民自以不寃大理如楊注曲盡人情唐臨折中稱意可謂善用刑矣然而不得方諸大舜孔子者何也明雖盡而誠未孚也矧用刑於不教之世哉故明出於誠誠則自明明誠相資庶矣兹名其廳抑有意於斯乎因書於壁尚俾來者有同此心者云海運千户所廳記古封建之世天子賦粟於畿甸諸侯賦其所封勢定而力均地近而民逸自秦郡縣天下歴漢唐漕運於四方踰越江河轉輸數千里官司之須兵民之儲調發不時饋餉非一水陸既阻民力遂疲迨我皇元混平區宇始創海運取東南竝海積粟以實京畿置三大府吳分六所設官專職買舟傭工悉酬公帑民不知勞神模逺畫度越前古明越當海道要衝舟航繁夥甲他郡而治所在明獨庳陋弗稱至圯壓不可支天厯元年夏達魯花赤武節將軍暗篤刺公至官欲徹其舊而新之曰吾聞信而後勞其民吾之政未孚不可以有為於是閱漕戸之貧弱逃徙繫虚籍者悉縱之異時傭直旁落徵集煩擾悉儆革之多授方略察良寙勤怠示賞罰上下既洽乃捐已資二千緡以倡𨽻漕籍者咸感奮興繕富者效泉力者輸役始事於是歳十有二月越明年三月訖工自堂至門列兩廡為吏舍為藏書室聽令之廬庖庫之所各有其序又即其東市民地為廏以楹數之内外凡八十有六堅茨黝堊煥焉稱美既落成乃相與來請記其始末余惟古之君子作事識先務斯易為功公欲興廢補弊能俟其信而後動宜不擾而事集人見堂廡之翼翼抑知公之治其事之本乎前兹十年公嘗提舉明之舶司公宇之新亦自公始前後成績左右輝映又知公之心久而弗渝也是可書已公字某大都人其哈迷公為都府萬户有聲公之為政蓋有所自云靈濟廟事蹟記惟天隂騭下民凡涉大險必有神物效靈以濟之若海之有護國庇民廣濟福惠明著天妃是已我朝疆宇極天所覆地大人衆仰東南之粟以給京師視漢唐宋為尤重神謀睿筭肇創海運較循貢賦古道功相萬也然以數百萬斛委之驚濤駭浪冥霧颶風颿檣失利舟人隳守危在瞬息匪賴明神有禱斯答其罔攸濟故褒功錫命歳時遣使致祭牲幣禮秩與嶽瀆並隆著在祀典去年冬慶紹等處海運千户所達魯花赤前進士納臣公至官廉靜易簡庶事畢理神廟適邇治所以累朝加封錫號之典發祥降祉之績未刻於石懼久將湮乃謀諸寮寀具本末請記謹案神姓林氏興化莆田都巡君之季女生而神異力能拯人患難居室未三十年而卒宋元祐間邑人祠之水旱厲疫舟航危急禱輒應宣和五年給事中路允迪以八舟使高麗風溺其七獨允迪舟見女神降於檣而免事聞於朝錫廟額曰順濟紹興二十六年封靈惠夫人三十年海寇嘯聚江口居民禱之起風濤雲霧神見空中寇潰獲全州上其事封靈惠昭應夫人乾道二年興化大疫神降曰去潮丈許有泉可愈疾民掘斥鹵甘泉湧出飲者立愈又海寇作亂官兵不能捕神迷其道俾至廟前乃就擒封靈惠昭應崇福夫人淳熙十一年福興都巡檢使姜特立捕温台海寇禱之遂獲封靈惠昭應崇福善夫人既而民疫夏旱禱之愈且雨紹熙三年特封靈惠妃慶元四年甌閩諸郡苦雨惟莆三邑禱之霽且有年封靈惠助順妃時方發閩禺舟師平大奚寇神復效靈我明彼暗賊悉掃滅嘉定元年金人入淮甸宋兵載神主戰於花靨鎮仰見神兵布雲間樹靈惠妃旗大㨗及戰紫金山復見神像又㨗二戰遂解合肥之圍封靈惠助順顯術妃嘉定十年亢旱禱之雨海寇犯境禱之獲息封靈惠助順顯術英烈妃嘉熙三年以錢塘潮決隄至艮山祠若有限而退封靈惠助順顯術英烈嘉應妃寳佑二年旱禱之雨封靈惠助順嘉應英烈協正妃三年封靈惠助順嘉應英烈慈濟妃四年封靈惠協正嘉應慈濟妃是歳又以浙江隄成加封靈惠協正嘉應善慶妃景定三年禱捕海寇得反風膠舟就擒封靈惠顯濟嘉應善慶妃寳佑之封神之父母女兄以及神佐皆有錫皇元至元十八年封䕶國明著天妃大徳三年以漕運效靈封䕶國庇民明著天妃延祐元年封䕶國庇民廣濟明著天妃天厯二年漕運副萬户八十監運舟至三沙颶風七日遥呼於神夜見神光四明風恬浪靜運舟悉濟事聞加今封廟靈慈納臣公言至順三年余押運至萊州洋風大作禱之夜半見神像頓息其隨感而應類此神之廟始莆徧閩浙鄞之有廟自宋紹興三年來逺亭北舶舟長沈法詢往海南遇風神降於舟以濟遂詣興化分爐香以歸見紅光異香滿室乃捨宅為廟址益以官地捐資募衆創殿庭像設畢具俾沈氏世掌之皇慶元年海運千户范忠暨漕户倪天澤等復建後殿廊廡齋宿所造祭器余既敘其事乃作詩曰粤稽古昔人道事帝在傳具陳帝皞神芒祀於世世或君或臣洛神湘妃爰以隂類生人沒神婉婉天妃捍患禦災自其居室祀於莆田拯溺湊財廟號肇錫遂徧閩淛鄞廟崔嵬百世血食濟險驅癘霽霪雨暘擒賊解圍宋自靈惠封十五更曰夫人妃迨我皇元萬斛龍驤絶海達畿東南庶邦島夷蠻商獻琛是職波晏不揚如履康莊神惠孔碩天子曰嘻精意以享毋怠毋斁徽號四加表此殊廷以報元功鄞江洋洋潮汐送迎我作銘詩刻石之貞式昭無窮跋跋浮屠信中孚遊蓬萊詩卷後儒與佛異道儒嘗闢佛佛嘗詆儒然差之毫釐則卒相竊韓子所謂儒名而佛行佛名而儒行者也蓋儒佛皆人耳人性善而發於情有善有不善者以其所感者異也佛者見情有弗善遂欲滅情以復性雖有耳目口鼻四肢之體必欲置之無用之地夫情即性之動情滅則性無用况無可滅之理與此儒者所以闢佛而佛亦以詆儒者也然儒而好高或流於佛而忘自反佛而有為乃歸之儒而不自覺若中孚者非佛名而儒行者歟中孚氣清意淡工於詞華樂與大夫士交而所寓必焚香掃地披經讀書揮絃灑翰有出塵趣凡東南山水之勝未嘗不躡蹻擔簦以嬉前年自天台歸復與大虚師買航絶海為蓬萊遊凡有得必誌之以詩辭旨清新非特其徒有弗及而已夫詩文固儒之餘而中孚於其業之外而慕之嗟夫使中孚而歸之儒安知其不入室也哉吾於中孚有感跋二史公唱和詩四明文獻故家史氏為大一姓三相侍從守使不可勝數蓋與國相為盛衰者也然雖婦人小子皆知本於夫人葉氏一念之貞與八行太師積累之功可以訓矣迨宋李世猶見資政觀文二公創鄮麓廟庭序昭穆㑹拜其叔姪兄弟唱酬諸篇怡怡融融氣象見於言外嗚呼盛哉迄今餘六十年時異事殊頽垣荒址過者憫焉菊屏司户蓋諸伯也其子洪父誦故典如流出墨本相示庶幾愛禮存羊碩果不食之意其善繼述而厄於勢者歟使其子孫皆能以洪父之心為心江左夷吾猶一日也然有賢有不肖彼頑冥淫酗持箕裘與人惟恐後者覩其詩亦有羞惡之心乎跋嚴子秀詩卷嚴公子秀為南陽來威屯令有善政迄今二十八年郡人猶能求四方士大夫之詩以詠歌其事何其思之益久而不忘耶蓋前人之令屯田者卒能使農事理恒數登斯為善政矣今公為治有本末緩急蒞事之初洗宿蠧布綱紀却私饟散羨息於耕民民既足食則毎屯設學擇師而教其子弟彼三時治田而冬讀書明道徳以變其俗不啻若父母之字其子嗟乎此其益久不忘者歟三代之政弗過是也而嚴公行之於來威效已若兹使以是治其國家其得民詎止是耶公之善政具見於魯公子翬與泰公竹友之文兹不復論余獨論其為政而知本末緩急者其效蓋如此云跋孫氏義兵詩卷古井田法寓兵於農民各得持弓矢以自衞後世異是寇至即愕眙相視袖手待死過浹易旬官兵始至而民家抄掠盡矣有志之士能於其下而不能使之復古也賊蔡之寇寧郡若孫君良臣之捐賄財置攻具紓官力衞鄉邦非其有愛人利物之心而規橅素定者能若是耶有司既旌其門而朝中大夫士復樂歌咏其義余因以謂井田未易復也持鈞衡者有能放井田寓兵之法而行豈徒一鄉之衞天下之衞也於是乎感跋吕與之修禊圖蘭亭之㑹一時名士風流標致後世慕焉然世不傳其文而傳其字使不有其字文將不傳其事冺滅可知也字者騷人墨客適情之具而人君好之唐太宗使蕭翼以計取蘭亭真蹟於僧舍幾乎玩物矣房𤣥齡又以權謀薦翼其輔弼果王佐之道哉及太宗不豫特幸玉華宫謂高宗曰蘭亭序可與我去以天下之大豈無他務可屬邪成王末命曰率循大卞燮和天下又曰爾無以釗冒貢于非幾太宗能不愧哉余閱嗇齋吕君所藏修禊圖於是乎有感跋夏氏詩文右聨魁堂類藁一卷廬陵夏道存所作余得之其兄今考官㑹稽令仲善君所讀之累日愛其用意幽逺文辭雅潔不肯為世俗浮靡一言一字使益昌其氣追古作者不難到也仲善令興國時道存實從之學仲善亟稱其能又稱其工舉子業果然必為名進士矣昔謝康樂善為詩每見從弟惠連輒得佳句至今人稱二謝傳曰二惠競爽夏氏其有焉跋朱府君詩卷番陽朱克用以山澤之臞至遇今上皇帝於潛邸扈從說書有勞出領郡兵佩金虎符為千夫長士君子韙之謂克用非有文武長才何以至此而克用且退然儒者不易其素也間示其先君子臨終時手寫詩一首若預期克用之達者蓋知子莫若父也道徳文學功名富貴皆足以大其家顯其親要在人之所存何如耳膏沃而光􅁮源深而流長朱氏之大其可量哉
