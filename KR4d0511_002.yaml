body:
  text: 積齊集卷二元程端學撰序牟清忠公奏議序處踈逺而論機密冒戮辱而觸忌諱此君子所自信而衆人之所深愳也孔子曰見危授命箕子曰我不顧行遁夫君子有道則見無道則隱見危授命不顧行遁不已過乎雖然各適其時而已矣審將然之勢為吾之進退者君子之道也既食其祿則憂其憂於其傾覆之際而惟難之辟豈君子之道哉宋當理宗中年宰相姦邪卿士比黨奄宦嬖妾弄權請托軍疲於戍役民困於徵求天變洊臻而弗悟國步已蹙而弗謀於斯時也尚可以位卑而忘言畏死而避嫌哉朝廷豈無論事之臣或毛舉細故或泛言治體為全身計敢言及其君哉敢言其君不敢議一權勢之臣敢議權勢之臣不敢侵一用事之奄宦敢侵用事奄宦不敢議一嬖幸之宫妾蓋宫妾之訴易於奄宦奄宦之譛甚於權臣權臣中人酷於人君之殺戮得罪於君猶有諫諍之臣得罪於權臣宦妾不旋踵而殱其身此古今之通患况宋之季世哉牟清忠公在嘉熙淳祐間仕猶未顯也其進言於朝人君之心術未嘗不切也宰相之過惡未嘗不論也內而宦官宫妾外而軍民膏肓事無不知知無不言及其密邇禁闥始終弗渝其言光明正大而根據理義卓然竒偉而究極情事言人所不敢言攻人所不敢攻身之弗恤惟國之謀生之弗欲惟義之取人為公愳公處之裕如也孟子曰生我所欲所欲有甚於生者故不為苟得死我所惡所惡有甚於死者故患有所不避若清忠公者可謂自信君子歟然而天下知公之敢言而不知公之所以言知公之敢死而不知公之處其死公之言必欲格君心回天意辨義利正人道公之所履君信其忠人服其誠雖陰險小人不得肆其毒於人望故仲舒見憚於驕主仁傑免禍於女后公亦全軀於斯世詩曰既明且哲以保其身清忠公有焉公諱子才字存叟蜀之陵陽人仕止一揆之道卒以直見沮著論議制誥詩賦雜文多所遺逸僅存奏藁數十篇公之孫浙東帥府都事應復景陽父嘗出以示端學伏而讀之使人流涕太息慨其言之不盡傳也景陽且徵端學為序屢以晚出非分辭而弗獲因書於簡以告夫天下後世之事其君者必取於斯為勝私起懦犯顔納諫之本云至順三年四月朔從仕郎前翰林國史院編修官程端學序丁燕詩序至順壬申春丁當太守正議公治明之三月率僚佐及郡之秀士蕆事於宣聖之宫虔恭儼恪翼翼若臨既卒事公諗於衆曰祭有胙有餕禮久弗舉懼墜彛典於是致大府之賔客百司庶職暨耆彥之士合燕於學鐘鼓既考絃歌既作尊卑秩秩威儀棣棣醉而不亂歡而不譁上下孚洽若陽和被物流膚浹髓士友相慶曰是禮弗講餘草年矣稽舊圖新惟我公是尸考禮正俗惟我公是維可無詠歌之辭乎什既成乃來請序魯頌泮宫之三章曰魯侯戾止在泮飲酒順彼長道屈此羣醜其四章曰穆穆魯侯敬明其德敬慎威儀維民之則其六章曰濟濟多士克廣德心蒸蒸皇皇不吳不揚維公之政嚴寬敬簡涵煦摩括未施而先信其諸順道敬德而慎威儀者乎有以為民則矣吾黨之士盍亦克廣德心以迓公之化不但頌其在泮飲酒之美則明之治其庶幾乎是燕也豫既間客席不得辭為書於卷首周以韶建縣尉㕔詩序豫少時過鄞縣尉廨故址索然徒見荒榛蔓草牛羊牧焉而尉常寓民家朝東暮西迄無定所余嘗曰無尉耳有尉斯有所或嗤余曰官無出民無入談何容易余不敢辨然心未然其言也既余仕於朝一日南歸復過之則巋然有屋巍然有垣愕眙問於鄰曰吾尉周公所營也尉始至歎曰官無髙卑不肅則慢尉以詰盜而不有其所非所以肅也營之不在我乎然民未豫孚不可有為於是求民瘼審獄寃除蠧黜奸發摘盜賊不事鉤距皆使自實一無所旁引士民咸曰有尉如是可無居捨資就役者若子之趨父命也不踰時落成余聞之曰嗟乎廢興在天興廢在人不其然乎然興廢有二焉曰志曰勢有志無勢不遂有勢無志不為民樂從事勢得為也信而勞民周君志也志與勢相須而成事如反手余所謂有尉斯有所者其不以是也歟於是翰林侍講學士袁公刻石紀績大夫士歌詠其事余亦喜前言之有合也書於卷首遊赤山詩序有人作之境有天作之境役吾心勞人力積石象山地穴池壑彤庭緹幕金碧照灼嘉木妖葩蟠攣倒植籠養珍禽檻囚異獸與人相廢興者是謂人作之境自然之山自然之水逺瀾近薄可眺可止風氣自清閒雲自生幽鳥清猿時來自鳴與天地相始終者是謂天作之境人作之境富貴者樂之天作之境貧賤者樂之故筵列觴爼崇酒載羞荆豔趙謳左右獻酬飲則絲竹遊則鑾舟者富貴者資以樂其境者也濁酒盈壺釣水採山二三同志提攜以攀狂謡醉舞乘興往還者貧賤者資以樂其境者也大德八年臘月草日余西行至桐川與友潘伯勉自牧節之同上赤山得佳趣焉於是縱酒賦詩窮搜極討蓋坐見暮色自隔溪來而忘其去余喟然顧謂三子曰此非天作之而吾儕所得以樂者乎咸謀伐榛荆結屋以避風雨憩昏曉焉謀未遂而或者乃疑是謀幾人作者余曉之曰凡物皆天作而地設之必成乎人彼富貴者强其無以為有余特因其有以益其所不可無吾以適意而彼則留意焉其勞逸得失之間達者必有以辨故書其說於赤山詩之首括蒼尹仲明玉井樵唱序杜少陵獻三賦時正升平無事至德以後亂離飄泊指潼關而下馬望曲江而行哭憫石濠之老婦歎空谷之佳人走鳳翔竄同谷客錦里涉䕫門時移境換觸物哀吟覽者為之墮淚至建炎中陳去非避冦房陵茅屋夜半聞澗水聲追憶少陵詩句自恨平生不得其意而輕讀之事有曠百世而相感者亦係其所遭故耶括蒼尹君和靖之諸孫世躋仕版君獨流落不偶故里家園燼於兵火對信安風雨之榻念奕山燕雀之巢弔㑹稽之陵紀錢塘之夢慷慨懷古之情沉鬱不平之氣一於歌詩發之然其怨而不誹婉而成章略無時粧俗態使杜子美復生亦當領略其句顧余非知詩者而身之所遭適與君類獨能深知其意而悲之年少貴人未必知也嗟夫余與君俱老矣余老且拙弗諧於時君方北游欲詣闕下獻子美三賦豈終流落不偶者耶然嘗考之和靖與去非同時居洛一則執經程門立雪不倦一則飲酒吹笛於午橋花影之下人品固不同也京西之變尹弃家而入蜀陳攜孥而來南陳旋參大政碌碌無補尹為德逺汲引復為㑹之擯却晚入經筵屢疏不合抗節而去經學之驗豈詩學比耶君明經世其家而託興於詩以其猶有意於出也故以先業期之抑昔人譏去非大用後不復作詩不如不大用而賸作好詩之為愈也是又一論君試評之君名某字某云朱溪里家傳序同郡溪里朱君出其家傳示余曰我祖若父積德纍行以至於我之身名不登於仕版甚慙無以顯之子能為我發之乎余伏而讀之見其髙祖兄弟之分財弟取耕牛十有三兄得其一他物類是悉弗與較其祖為父訴寃於朝九年不解卒悟上意以得直及其父成童始學晝讀夜思以底於成教子以禮化及宗姻代兄受刑守令憐而見免其母字子一語不欺凡比數端舉足長世勸俗為之三復而歎曰夫人孰不欲顯其親若知顯之之道乎十室之邑必有忠信古今人物衆矣其嘉言善行何可勝紀而史傳所載萬不一二由其子孫不能知祖父之志而不足以道之也有能道之者往往言行不孚於人而人不信故修身者顯其親之道而非爵位之謂也爵位能使人慕於一時不能使人敬於後世修其身者人必曰某也有子若此敬其子及其父矣况爵位有命而修為在我故曰修身者顯其親之道也朱君祖父之行自足以顯而朱君之敦篤有文又足以使人敬而信之他時執史筆觀民風者將有所不遺也朱君奚慙因書其後以還之送張大方之任序朝廷以關陜江浙諸郡大侵募民納粟補爵而吾鄉紹興學録張大方得調福清牛田管勾將行辭余曰吾棄儒官而膺是役日與亭户較錙銖之末此行能無愧乎余曰行也古之煮海以為利非直富國而已也將厚民之生而國依以富也今利歸於公者有經而民被其毒者無已豈非以其法有未盡者哉亭竈之家無賴久矣富者破産以輸公貧者焦勞困悴為溝中瘠其弊未易革也苟得良有司焉彌縫其缺失援墜隕於重溺起痿羸於將絶則亦庶幾云爾程子謂一命之士苟存心愛物於人必有所濟故其闢王氏新法甚嚴而身為條例司官者蓋以新法之害勢未易除吾就其中為民求生道拯一分弊則民受一分之利緩一分徵則民免一分之苦君子之所為其誠懇惻怛有如此者大方亦能以是存其心於人未為無補也若曰吾姑借是以為進身之階愧將在此而非彼之謂矣大方勉乎哉牛田丞前禮部侍郎胡君亦鄉人也道余問訊并以是告之當有感於余言送黃心道之任序余讀宋史至髙宗時給事中黃公龜年劾秦檜奸回事未嘗不斂容加肅也當檜用事忠臣良將惴惴懼不脫虎口獨公劾檜不少貸朝廷不得已至罷其相既而檜復柄用人為公懼公不動色卒隱淪全軀以沒非所謂行義達道明哲保身者歟丈夫至此亦足以慰平生不與物俱腐矣其八世孫曰傳孫者從余遊余每以乃祖之彛訓是朂生亦能斤斤雅飭以弗克光前人烈為懼而以儒自業今將教諭臨海前辭且請曰先生何以行傳孫哉語之曰爾知爾祖之烈可敬可慕抑知爾祖積功纍行非一日故乎慎乎其細而形乎其大力乎其初而弗替乎其終久而見之劾檜之績録之青史與日月爭光借使侈然於平日而有激於一時吾未見動上聽而服衆心履艱險而出危禍也夫官無髙卑祿無富貧有志之士弗敢怠者以其為之兆也志定而後險易甘苦弗懈弗渝底於有成故海合百川而成巨浸人集衆善而建大業生之往也不在敬其始乎送薛州判歸治所序余讀漢循吏傳竊怪班孟堅不置兒寬六臣列第序其居官可紀而已寬為內史勸農業治刑罰理獄訟卑禮下士務得人心收租稅時裁闊狹與民相假貸民聞課殿輸租襁屬不絶課更以最能是六事不謂之循吏不可也彼六臣有能外是者乎無也寬縱不得與龔黃朱邵比豈下王成哉豈孝武事奢侈輕民功故寬在當時不得以循吏稱歟仲傑薛侯之判奉化也余適歸鄞州去鄞八十里而近自南來者舉能言薛侯實政其於農業刑罰獄訟禮士得民視寬無愧逺近上下既咸信之矣今其督輸㑹府而來鄞也侯驗民逺邇載輸久速揭片紙示約一吏不遣一箠不施輸無後期者畢事先官限課為諸州縣最且常年輸租吏並緣侵漁侯事為之防苗媷髮櫛無留奸焉此又得於親見故人益信之世言古今人不相及觀侯之政果不相及乎哉侯一州佐耳權非內史比也且去漢千五百年時益以難理一開誠布公效已若兹使異日位益隆而志不渝其於所成可量哉今制亦以五事備陟守令凡秩滿公牘上吏部五事無不備者是則僞增如王成不少矣侯政有異等儻見之公牘有司將或不異之矣噫苟為成俗民瘼不瘳宜哉侯將歸治所鄞士為歌詩以餞余亦序其實以俟他年傳循吏者考焉送張治中回任序治中於郡事無所不統然上有監守下有佐署有僚寀律凡當署自下而上則寮寀擬成牘以上判官署治中乃署而又總裁於守若監為治中之職者雖無所可否可也故雖有仁心善政不能遽使旁通逺洽而闒茸迂踈者尤不能一措畫於其間非不剛不柔中正和樂之才不能調護彌縫以和厥政是以能盡厥職者為甚難廣平張侯大卿來為明郡治中下車之初即以賑饑得民心其於郡事一無所苟涵煦摩刮務得其平民䝉其惠而不知其功其余所謂不剛不柔中正和樂之才歟侯工於詩詞又善譯語引類為韻以行於世其治效非特其才之美又其稽古之力也人謂侯能為其所難使他日得一郡專其所設施以為其所易其治效豈止是哉於其受代而去也吾鄉士民惜之咸為歌詩以贈乃相與來請序余先世與侯鄉人也今其交往之密意氣之合雖無所請其能已於言乎况輿人亹亹道其德政之實故托而書之於卷首送王漢卿典史秩滿序人之用世不可以無才然才入於規矩為髙才入於淫泆為下才曽子謂君子可託六尺孤寄百里命蜀先主稱諸葛孔明十倍曹丕才之入於規矩者也孟子謂盆成括小有才智果謂智瑶以五賢陵人才之入於淫泆者也由是觀之豈才之罪哉其所趨者異也余於宣城王君漢卿愛其才焉久而觀其行事又愛其為有用之才也案牘之職其難尚矣尤難於佐鄞鄞邑密邇元戎大府自令丞至寮寀雞鳴而起既受命於大府又受命於㑹府送迎期㑹日不暇給其間抵牾拂撓其所行者不少也漢卿於斯時從容措畫若不經意而衆務畢集豈非以其才哉然其佐邑在法必執非法必辨美事樂為蠧政務去於是上察其能吏畏其明而民懷其惠非有用之才歟於其受代而去也士民德之咸為詩以道其績乃相與來請序余亦喜為書於卷首送陳教授之任序四明人物甲他郡德行藝能之士文武將相之才繩繩焉代不乏人雖天文地理醫卜之學亦皆精藝超絶可表斯世蓋其山川秀美蜿蜒停蓄不産他材故草木金石之物無所名天下而其清淑獨歸乎人若東野陳君者蓋陰陽星學之嶄然者也東野本儒業又傳其術於父而以淑其二子天祐天裕父子三人皆以其學得名皆受知於顯者更相薦引受命為郡教授鄉人不獨愛其術且榮其皆有遇也東野年踰七十越數千里往教中山人或難其行東野則曰君命我勿敢擇雖老無寧自逸尚敬往哉大夫士咸壯之爭為詩以道之請余序其首余謂天地間理數外無物然儒者惟義是比有弗謂數者理有定而數無常懼其泥乎彼者遺乎此也今東野之學其於陰陽參伍錯綜吉凶悔吝之數講之詳矣而其言汲汲乎不廢君臣大義其不以數遺其理者也理與數儒者所弗能兼而東野欲兼之宜其視數千里若跬步雖老而不倦也余欲已於言安得而已乎送周教授回任序傳謂家難而天下易家親而天下踈蓋父子以恩君臣以義恩難處義易裁也庸詎知師友之難哉師友在恩義之間合踈而為親嚴則離和則慢使之不離不慢畏而愛親而敬豈不難哉此直其自相師者也庸詎知校官之尤難哉校官之於士以勢合者也夫人受一命而為百里之師其年未必長也其學未必充也其行未必修也其名未必聞也驟然立乎六館之上講道施教以表率乎六館之士六館之士其不愕眙訕侮也者幾希是其尤難者也吉安周君似周之教瑞陽則不然齒尊而望重學多而文優士無賢不肖咸服其教無逺近願受業焉夫教官以勢合士友而心服之必有其道矣三年受代士友惜之咸為歌詩以道其行乃來請序余謂周君教行於其難其所易者從可知矣惜乎年及致仕而不得施於政也國朝之制惟集賢翰林及精力未衰者不在致仕限周君矍鑠如此尚堪一行幸無讓送花教授秩滿序士之以校官進而受一命之寵者難矣哉律二十五始得仕由鄉校薦之郡郡試其文移憲覆核率二三年為直學典餼廩之出納又二三年上之行省若大府行省若大府類其名復三四年授一諭若録近者五六年逺者十數年然後領事三年秩滿復如之又十數年然後領事三年秩滿復如之又十數年升正若長正三年始上之都省部又三年始授一命為州教授州教授三年始升之郡郡教授三年始入流為縣主簿士而至於州教授年且致仕矣故得州教授者十三四得郡教授者十二三得縣主簿者十不一二有終身不得者焉夫以奔走雜塵鞅掌焦勞三四十年而所就若此豈非難哉濡須花梅村以教官遞為明郡教授所謂難得者也三年而歸且將致仕梅村家有田園有子服勞奉養自此違雜塵辭鞅掌去其所難就其所易日與鄉鄰父老攜酒相過問桑麻消息上八公山訪神仙遺跡平生之樂在是也然朝廷惟兩院為養老尊賢所出常律外若安車蒲輪儼然踵門樂將在彼又非余之謂矣至順三年二月既望序送張起潜直學詩卷序學以是道進以是道君子也學以是道進不以是道衆人也夫人孰不欲以君子自處而卒以衆人進者豈非拘於其法哉校官之職道弸乎已正臯比以待問者也而由直學為之是以衆人之道進也張君起潜業儒業道儒言領事岱山或疑其行余曰不然委吏乘田孔子雖不以之為進身之階而亦不辭焉者以錢穀之事舉吾分內也使張君益修其業無所不足乎身亦知錢穀為分內事而姑假以是售夫今之法余安能知之於其行也交友咸詩之又相與來請言書此以勉之送姜子明平反序史稱張釋之為廷尉天下無寃民于定國為廷尉民自以不寃二人者皆不速民於無辜然釋之數爭論上前所持者平故其及於民也廣定國居職十八年哀矜審慎故其信於民也深世謂史氏製言有體要焉子明姜君為杭州司獄七年遇疑罪旁諏逺訪必核其實憲使周善長薦之南曹於是有判官昆山州之命既而調瑞安有慈溪民胡為人殺於財不得其情有司驗治鞫訊誣服具獄上連率大府疑焉聞子明有能名移使治之子明掠去捶楚設方推讞殺者得誣服連引者數十人一時盡釋之人無識不識咸快慊稱頌不絶口士大夫形之詠歌且相與來請叙其事余謂今之刑部尚書猶漢之廷尉也使子明當此任聽之專而任之久將無愧於古今之人人材未嘗借用於異代而能使各得其職顧握黜陟柄者如何耳余於是乎有感書以行之送鄞尉周居性序括蒼周君居性來尉鄞奉八十之父以行勤於其職而謹於事親嘗過余問所職三年受代而丁父憂貧無以返葬或勸其從佛氏之茶毗君不肯曰余父仕宦至男爵骨肉未寒忍置之灰飛烟滅之地邪既又過余問喪禮至是將奉柩以還來辭余請一言以自朂亦可謂謙謙好問者矣因告之曰余無以他事喻即子所行以為規夫人喜莫喜於祿養悲莫悲於輿櫬而歸一悲喜之間而人子之道在是矣然夫子謂喪與其易寧戚者非徒曰戚焉而已也蓋禮以中而止不得其中則戚猶愈乎易耳本之戚而禮以節夫動容周旋之間使毫釐不忒乃無歉乎送死之道送死之道盡則事親之道盡而事君之道不外是矣子能不憚千里而奉其親又不憚千里而返葬之猶不自足而每訪於余充子之良心而慎乎禮何所往而不為忠與孝也吾子勉乎哉送鄭極心序廣信鄭極心挾數學來訪余於甬東精舍叩其所以則自河圖衍之以知人之富貴貧賤夀夭灾祥如燭照龜灼小大弗遺見者往往愕眙而去既而徵余言余再三辭焉其請益固告之曰河圖者易之所自出也大衍蓋出河圖中宫天五乘地十之數而為揲蓍之法自揲蓍法行於世而人知趨吉避凶聖人以開物成務易之用可謂大矣後世不是之求而取其旁支小𣲖以支干生尅求人吉凶禍福雖時有中然間以人為而不出自然之理况其取用有淺深識趣有短長其能必有合哉極心之求能本其初而求之兼以見聞之熟比諸家為驗然易雖出河圖奇偶之數而聖人繫之以辭則惟言夫易之理蓋理得則數在其中舉數而遺理君子不取也易之作其於人倫之際君子小人之間扶陽抑陰之意所盡心焉也故可以往可以無往猶豫進退之機命之蓍可也而其君父之大綱善惡之取舍視吾義所在有不假夫蓍者焉夫進其義而死生禍福有不計者君子之心也二之以數而死生禍福則依違焉豈君子之心哉故曰王臣蹇蹇匪躬之故極心用意於河圖其於易之道亦有窺乎古人之際其亦先其義而後其數乎然則極心不獨演易之數將明易之道不獨明易之道將大易之用人能大易之用而名不彰者未之有也余言豈足為極心重輕哉
