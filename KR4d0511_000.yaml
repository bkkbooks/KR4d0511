body:
  text: 提要積齋集五卷别集類四元臣等謹案積齋集五卷元程端學撰端學有春秋三傳辨疑已著録其文集元史本傳不載世亦未見傳本惟文淵閣書目有之今檢勘永樂大典各韻中尚頗㪚見一二考曹安讕言長語記歐陽元為浙省考官本房得四靈賦一卷詞意高逈覆考官謂非賦體欲黜之元爭之力且曰其人賦塲如此經義必高督掌卷官取其本經則偉然老成筆也及拆卷乃程端學歐陽𤣥作端學墓誌亦稱至治癸亥浙闈秋試第二塲四靈賦詞氣高逈因得與選則端學以是賦得名必載集中今所存僅陽燧賦一篇而是賦已佚則散亡已多矣謹掇拾殘剰釐為詩一卷文四卷以備元人之一家端學之説春秋勇于信心而輕于疑古頗不免偏執膠固之弊然其人品端謹學術亦醇故其文結搆縝密頗有閎深肅括之風故曹安又記其會試經義䇿冠塲考官向宰相曰此卷非三十年學問不能成盖根柢既深以理勝而不以詞勝故與雕章繪句者異焉詩尚沿南宋末派觀墓志稱端學㤗定初扈蹕上都時虞集為國子司業深相器重而不甚見兩人唱和之作則端學不以是擅長亦可見矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3b348542c9805551c953cf7b67a4b3cc6d494b8127e1af98408b05324919ad44
