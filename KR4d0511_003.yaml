body:
  text: 積齊集卷三元程端學撰序送帥府經歷白君詩序國朝統四海界諸道間置宣慰使以馭險要東南雄藩又兼都元帥以鎮之浙東轄郡惟七東北際海南接甌閩海外島夷舟帆來賔撫綏得道一方敉寧比他道其責尤重凡膺此任者皆朝廷重臣其參佐僚屬必選才望兼濟之士以充之貴清白侯由省掾史知名執政來領都事事上馭下撫軍治民調和處置咸得其宜元戎有所倚賴守令有所奉承名聞于上暨終更復升經歷務稔事専厥績尤著秩復滿代者弗至衆方幸之適丁母夫人憂將扶喪北歸大夫士謂匪歌詩無以鋪繹萬一或曰當斬然衰絰之中豈侯所樂聞哉曰詩所以詠歌人之得失三百五篇歌頌譏刺非為斯人喜懼也發乎情之不得已為來者勸也侯之澤不可遂泯詩之作其亦人之寓于言者乎于是咸執其母之紼于西門之外而詩之以俟夫觀民風者取焉送李晉仲下第南歸序昔之舉士選于州今之舉士選于省省領州數十而登名者不當一州之數是一州不一人于是有連數州不舉者焉昔之治一經者惟意是適不必依經立義而宏辭别為一科今也必明奧㫖必守儒先成說而所謂經義者又出人意外研賾明微以求聖賢指歸古賦詔誥章表即昔之所謂宏辭者而今也兼之不持片幅悉由記臆士之得與是選者厥惟難哉然才有所長命有所遇其得之又若易然夫士之所尚知義命而安之耳知義命而安之則窮通得失不以動其心宜若易然而實難其人何者進士百取其一歷試諸難而得選于省奔走數千里㑹試京師又三取其一而二不偶苟非持養于平日不但為科舉學者孰免計較之私哉由是觀之與選者雖難而易得不動心雖易而實難能易其所難者豫于晉仲李君見之晉仲靜慎人也家建康教諭上饒舉進士于江浙省浮彭蠡絶大江遡黃河之險經乎魯趙之郊五千里來京師而不得志于有司其儕或戚戚至感泣而晉仲不一變其色且曰吾學未充命未偶耳君子求其在我者自外至者非所論也非養之有素而不但為科舉之學者能若是哉余安得不為晉仲喜也余兄敬叔先得交晉仲為余道晉仲美不絶口今以同年會京師從遊三月聆其言察其中盡得其美之實至是晉仲辭余南歸故余書其得于晉仲者以贈之且志余兄不妄與人云送蔣逺靜山長序人固有同出于儒而異其設施者未可執此以議彼也昔程不識李廣為邊太守不識正部曲行伍吏治簿書人不得自便廣行無部曲行陳人人自便幕府省文書二人者不相為謀然皆為漢名將儒之設教或範其程規使讀必熟索必精劬勞困苦而後得或誘掖漸摩感發志意使自為力雖各因其才然其成功一也故程伯子和氣冲融而學者自化叔子嚴厲剛方而門人敬憚亦若異道而世之為師者舍二程無以法果可執此議彼哉泰定初江浙行省銓教官議者言百里之師所在當擇建康臺憲在焉尤當得人以副宣明于是執政周謐密訪有望之士以充之其郡有豈巖王君創江東書院請于公得設山長而逺靜蔣君承之韓君及余兄敬叔與是選敬叔首設講為人敦厚謹畏終日危坐與諸生相對必使熟讀精思真知實踐本之晦庵西山教人之意酌以今日取士之法為書一編以行于世守其轍者往往有成韓君則余未識其人蔣君乃余兄之友也四明文獻之家惟蔣氏最逺而克世其家如蔣君者百不一二然蔣君之性疏通曠逺博覽强記為文章而尤長于詩今其往而接余兄之武余恐受業者未安其教也故先為道其質之所近意之所安與其並行而不相悖者俾無間然于其初雖然蔣君升堂進諸生而見摳趨之翼翼考其業而見其華實之班班將如蕭規而曹隨則余不能知之矣贈潘氏二子序三代興教化行風俗美鄉國閭巷莫不有學其教莫非窮理修己之實是故師友之間相率以從事者莫不以窮理修己為務至于有司選舉亦莫不論德藝以為優劣人之生于其間鄉閭以是教之師友以是率之有司以是選舉之于是時能循循自飭弗荒弗替此衆人之所易者也三代衰學校廢師友所從事者不一技而選士亦無常法然猶能宗三代之學者此君子之所易及者也及世愈弊而有司選士往往取對偶俳優之詞以為工于是師友率以趨時為務遂至于浮靡之風起而實學廢間有一二好古者從事于其實則師友相聚而笑之鄉閭以是致侮有司不以是見擢于此時能傑然特出卓然不惑獨其心欲追古人而從之者蓋君子猶有所難矣孟子謂待文王而興者為凡民無文王而興者豪傑是也大德庚子余來桐川潘氏二子就余問焉余告之曰古之學窮理修己是已今之學俳優是已將焉從二子喟然曰學至于古而後可以為學也自是相與辨詰問難窮其源究其歸絶其外反之于內或以非世之所趨者告之則二子笑而不答嗚呼其亦有傑然特出卓然不惑之意歟今余且歸二子曰先生何以留我哉余嘉其欲行君子之所難也書以贈之二子長曰謙次曰貴和從兄弟也贈國學生巴延歸覲序古之學者誦詩讀書習禮樂之節射御書數之文然後有以斂束其情薰陶其性以成其材故禮有經禮曲禮至于三百三千必動容周旋無不中是而後可以言禮樂有五聲六律八音必訓習審察使無奪倫而後可以言樂至于射必內正外直進退適宜然後中正鵠御必範其馳驅調其疾徐然後免覆轍雖書數之微亦研覃源委不差毫釐然後有實用而謂之通六藝焉吁何其煩且難哉然養其外有素則在其中者益堅故其成材也易今之學者當六藝盡廢之餘兀坐終日誦四書五經宜若簡且易而造其微者難其人蓋六藝之事少而肄之以至于壯即其事可以明其理故人樂為其學而易為力四書五經聖賢之藴誦而不得其意則其心困以怠怠則終棄之而難為功自然之理也然則今之學者終無成乎亦在乎不已而已夫禮缺樂壞射御書數相繼而廢非一朝一夕矣不可得而學也苟能即四書五經而専之詳其句讀審其訓詁涵泳從容以求其意不已則熟熟則浹洽而樂生焉學而至于樂雖微六藝之具而六藝之本在我矣意既得知既至而行有不得者吾未之信也國學生伯顔從子遊學勇而専困而不怠遊國學三年將歸覲其親乞言于豫豫嘉其専于學而懼其畏成材之難也書其所以易者以勉之送吳友雲序甬東道士吳友雲不問生産作業酒一壺詩一篇而已其言曰方外之士以其餐霞茹芝騎麟翳鳯尋竒索怪為人所難為之事乎非也玩物適情樂其自然以養其生斯已矣故凡東南山水之勝未嘗不躡屩擔簦以嬉又以為不足將北遊燕趙之墟觀光上國極臨眺之樂一日來辭曰先生何以朂我哉豫應之曰子既自得子之道矣子何朂豫行天下久矣蓋倦遊者也方弛擔息肩晦明養拙日從鄉曲父老問桑麻消息教子孫為村學究燕趙之士多豫故人有問豫者煩以是告之送陳子敬序武林陳子敬由浙漕掾升閩浙帥掾秩滿當改授且行大夫士樂其志之有成也而詩之來請于余曰先生何以行肅哉因朂之曰夫人之以吏胥進而膺一命之寵難矣哉其始也籍其名于有司率數年始食于上三考始一升又三考得改授其間官長之喜怒庶物之埤益錢榖之虧盈功過毁譽之相尋利害禍福之所倚置身僥幸之地而後能豫蓋有皓首而不遂者焉子敬亦由是進而獨異乎彼者子敬美風姿談論舉止放乎儒字畫吟咏出乎其類信乎僚友而獲乎上未弱冠不家食未强仕即改授所歷無有阻抑摧挫之勞若輕舟遇順風瞬息千里使世皆然由吏胥而仕者亦無難矣然君子處已不敢自易而常難之故能斤斤警戒飭懼求寡過之地以成光大之業在易所謂安不忘危者余之所望于子敬也然則子敬之仕也孰禦焉余既重其請故不以頌而以規送周以韶序余教成均時遇鄞人問鄉之賢者得三人焉廉潔下士稱宣慰副使姜公元位安詳治劇稱鄞尹阮君申之明簡集事稱鄞尉周君一䕫余雖雅敬三君而未識也次年南還皆得交焉既余官史院三年而歸田姜阮二君猶未代去周君亦辟為浙東帥府掾在鄞往來無間因悉三君之為人而尤愛周君之才蓋古之仕者位大為難小為易今之仕者小為難大為易古人道不行于時則辭尊居卑辭富居貧祿養以求乎其無愧今祿薄而務益繁事細而責益重斯小者難也尉為九品而職詰盜鄞又並海為劇縣私鹺巨姦竊發相繼一不獲即受謫于州若府尉率不終其任自君之來發摘攟托舉有方略一無所隱而人服其明連引者一無所問而人受其簡故犯者常少以其餘力創公宇受他委連帥恱而見辟佐府事又以能稱逮終更不一齟齬今其秩當得邑令其效當不止于尉以君之風流儒雅益以道自勵雖為一郡理一藩當無愧古循吏鈎巨求情豈其心哉余又以能其所難者卜其所易者也夫樂道人之善而不諛君子所與也余既為阮君紀績於石而姜公之去亦序其行今其往大夫士咸詩之雖欲已于言安得而已乎送江聲伯序士有可用之才而不見用于世然後人惜之有可進之機而不自進其身然後人信之其或非所用而不用無所進而不進勢窮力屈而止者碌碌之徒耳句容江君聲伯學博而通識者咸曰可以出而仕矣而未或遇也一日躡屩擔簦來京師識者又曰其必有合也其少試已乎既而集賢大學士趙公雅敬江君之為人將薦諸省部而爵之君咈然曰吾楚産也觀光京國以廣吾見壯吾氣而已出而求祿豈士之守哉長揖而去于是中朝大夫士咸信其守而惜其去也詩以送之子亦樂道其善為書于詩卷首送應景茂序明郡之東百里曰昌國明之屬州也其州刋山為城環海為郛平衍豐腴可耕可居州人道郡者必梯山航海而來若與世相懸絶者故民淳而事簡仙佛所鍾而怪異錯出蓋地靈然也豫嘗謂其地所産非仙物怪事所能獨當必有人焉領其秀者惜乎險阻跋涉未得與接也至治癸亥豫計偕京師見昌國景茂應君于旅舍氣清而和學多而才又世家子喜而與之同居情至渥也明年豫及第助教國子而應君亦以善國語授學正建昌將奉檄歸榮其親請曰先生何以行我哉子告之曰孟子曰士尚志夫仕以行義而非以榮身與親也子筮仕之初盍前定所趨哉所趨定而榮身與親在是矣世之營營于其身者若知所趨乎則是榮其身適所以辱其親也夫秦之與越相去逺矣出門而東西其轅不頃步而秦越之路分子知秦越之路决于頃步則轍環天下皆榮身與親之道也夫然昌國之秀非子領之而誰歟豫與應君家同郡出同居又平日願見于百里內不可得而今得于數千里外敢辭一言送趙仲玉序內剛外柔君子也外剛內柔小人也內剛外柔非矯也君子之道然也和而不同內剛也非君子歟外剛內柔謂非矯誣也色厲內荏聖人比之穿窬之盜非小人歟然具內剛之質者必成于學學與質相資然後宏衍光明而物欲不得引吾內故老而彌堅是謂義理之剛衆人能用其剛于壯嵗及其老而變焉者血氣之剛隨人盛衰者也永嘉仲玉趙君為浙東帥府從事嘗訪余于甬東精舍望其容謙以約聆其言理以暢訊其行事方而不害其內剛外柔之君子歟其質之美歟抑學之力歟故余因其所近樂與論剛柔之道及其受代而行也書以贈之送道士卓無為住虛白觀序孟子謂古人修天爵而人爵從之今人修天爵以要人爵當戰國時風俗雖薄未若後世之甚也而其言已有古今之異况乎後世要人爵者宜甚衆也然而猶有敦篤不外慕之士何哉蓋仁義忠信之在人自生民以來至于今也故雖時有變遷俗有厚薄而本心未始與之亡此十室之邑必有忠信如聖人者焉余于卓君無為益信無為本儒家子其父鄮山翁問學謙恭偉然為鄉先生無為雖離世為黃冠士而其願慤勤厚有乃翁之風晏然若無所慕于世者于是主者與其徒愛之薦之兩教所俾主奉化之虛白觀無為亦不喜色夫道家者流雖異乎吾儒之學然其心同一天爵也雖無公卿大夫之榮然受檄以領一方之衆亦人爵也其無求而得之豈非人爵從之之謂哉且佛氏以寂滅為樂老氏以清淨為宗而其徒爭相為長者接迹于世甚則毆擊鬭訟紛紛不已若無為者亦可為其徒勸也今果有人焉修其忠信仁義充類以究其餘至乎有造豈無自然之效哉患在持之不力耳余于是乎有感于其行大夫士咸詩之無為余祖黨外親也亦書其所得者于卷首至順三年六月既望序潘伯勉名字序名出于父字出于友出于友字無不善出于父名有善不善何則人之生父命之名或因其材或即其事殷之君以甲子名孔子以丘名孟子名軻鄭伯名寤生古之于名曷容其心故有善不善至于字則始于冠焉古人重成人之始而為之冠禮召賔友而字之夫賔友字之所以覬其成德也覬其成德而為之字惡得而不善豫嘗曰德者名與字之實也名與字德之符也善其德而不善其名與字可也善其名與字而不善其德可乎嗚呼冠禮既廢人慈其子于襁褓而加之字矣及其長妄易其父所名者有矣是以傑然其名字而不有其德者接迹于世而兼名字與德者蓋間世罕見焉建平潘氏子以貴勤名其父能復古冠禮召賔友因其名字之曰伯勉夫勤者天地聖人之德也日月星辰之所以運風霆霜雪之所以交天之勤于生物也江河之所以流鳥獸草木之所以蕃地之勤于成物也二帝三王之所以相因相繼孔孟之所以皇皇奔走聖人之勤于育物也可以人而受形天地具聖人德而獨異乎哉故孜孜矻矻未至于聖而不已焉者君子之勤于修己也易不云乎天行健君子以自强不息然則勤其名而勉其字豈不兼善已乎雖然名出于父也字出于友也而修其德以符其實則惟伯勉之所自力伯勉才清喜修余何以勗余特病夫世之贈言者以譽而不以規也故告之以此王氏女貞節詩序子讀孟子至由是則生而有不用由是則可以避患而有不為未嘗不廢書而嘆也夫有可生之道而不用有可避之勢而不為豈其懵乎利害禍福之間哉心有所主而欲惡有甚于生死云耳蓋吾知行吾義而已行吾義至死生不足動其心况榮枯得失之小哉故忠臣不事二君烈女不更二夫良有以也清風張君榮祖之母王氏年十九嫁不一嵗而孀妊子才五月男女未可知也王氏誓不改生子得男長而教教而成以至于登仕版于是郡縣上其事春官旌其門嗚呼方其夫死而誓不改豈知見其子之仕與其旌異之榮哉蓋吾知行吾義而榮枯得失之自外至者舉無足論而天之報施若合符節是則可矣于是士大夫詠歌其事而豫書其所以得兹榮者于詩卷首鮮于必仁割股後序鮮于必仁年十七割股起母病士友詠歌其事者曰母者身之自愛其母忘其身非孝歟或曰身者母之遺愛其母虧其身非孝也其師薛景文叙其事出其詩示余曰豫亦有言乎豫謂聖人之道如正鵠學者如射過焉不及焉中者難其人故曰中庸不可能也聖人設教抑揚進退俾中焉止已子夏三年喪畢援琴而樂曰先王制禮不敢不及閔子三年喪畢援琴而哀曰先生制禮不敢過也孔子皆曰君子門人以疑孔子曰三年之喪賢者之所輕不肖者之所勉故聖門無棄人必仁之為其孝之過于愛者乎然余有覬焉夫孝者仁之發而先見乎其初發而得宜為義中節為禮禮與義成人備焉必仁童子也誠懇惻怛已足以敦澆漓醒頑冥矧學之未艾安知異日不從容禮義中正鵠也哉其並藏詠歌之辭觀必仁于成人之日何如書與單良能論學書昨奉談論竟日甚樂也格言奧㫖謹已服膺其間一二疑義敢質之左右僕聞孔子之教人也仁而已當時惟顔子為庶幾故其問仁直告之克己復禮及請其目直答之四勿而已其次告以為仁之方為仁之方敬恕是也敬所以存仁也恕所以推仁也故其語仲弓曰出門如見大賓使民如承大祭已所不欲勿施于人及其告諸子雖因其質之髙下淺深而藥之大概不出乎敬恕之間故其語樊遲曰居處恭執事敬與人忠語子貢曰已欲立而立人已欲達而達人能近取譬可謂仁之方也已雖其設教多端不過使人復其本心焉耳及觀其為仁之具則又不過詩書禮樂而已射御書數其末也故曰興于詩立于禮成于樂禮曰十三學樂誦詩雖其學樂于童子之時而乃所以為終身成仁之地而詩禮固其始事也故曰不學詩無以言不學禮無以立故曰子所雅言詩書執禮不特孔子也成周亦然禮曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書又曰春誦夏絃秋學禮冬讀書一壞于秦火再壞于漢儒訓詁三壞于老佛異說四壞于文章記誦詩書雖存而其用泯矣然幸而孔子之書存乎世幸而曽子子思孟子之徒誦而述之幸而程朱之徒理其湮究其賾而其言已明今學者苟能因程朱以求孔孟之說因孔孟以求詩書之用庶乎有以知堯舜禹湯文武周公之所以相傳者如此孔子之所以教人者如此權衡丈尺秩然在我又以身體而力行之敬以存之恕以推之接物之際合聖人之法為之非聖人之法改之積力既久自至一貫之地則禮雖廢樂雖壞為仁之具雖缺而為仁之方尚有賴也至于不勉不思從容自得者乃生知之事學者之極功非一舉而可得者也故曰先難後獲近世學者好簡厭煩喜上達而厭下學樂升髙而忘自卑孔子曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲進德豈無漸乎謝顯道謂朱子曰天下何思何慮程子曰是則是賢却發得太早然則程朱教人與孔子不相悖也此天下所熟聞而僕之所陳為贅者也今足下曰吾服孔子而已曽子子思孟子程朱皆秋殺之氣得其一體者也禮廢矣樂壞矣譬之十間之屋壞其九矣得其一者謂十為一可乎且云朱子許曽子子思孟子傳道過也此僕所未喻也夫聖賢有不同者化之守之之謂也其曠然大公不以私意纍其本心則一也故曰或生而知之或學而知之及其知之一也或安而行之或利而行之及其成功一也得一體者可以語子貢宰我遊夏之徒若夫曽子子思孟子則具體而微者也傳所載曽子子思之事有過焉者其中年事也晚年所造蓋不終于此也且曽子傳道之說其亦有自孔子弟子顔子蚤死一貫之㫖獨告曽子觀其易簀之言曰得正而斃焉非朝聞夕死之謂乎韓子亦曰諸子之學皆出于聖人其後愈逺而愈失其真獨曽子得其宗又曰孟子醇乎醇者也軻之死不得其傳故大學中庸孟子者三子憂後世之心也傳述之以輔翼聖人者也今因其言以求其心其有悖于孔子者幾希雖當禮廢樂壞之餘而聖賢修己治人之大經大法固因之而有在也何得遂謂無傳乎至于程朱之言則又其遺意也史果齊有言程朱之徒述孔孟之意而不敢毫髮損益于其間者得其心矣且屋雖有壞堂室苟存可遂不理乎遂不居乎遂不遺子孫乎夫自禮樂廢于千載之上程朱之徒盡力于淪沒破碎之餘剖析于毫釐得失之際求聖賢之心而以身體之鞠躬至死其亦勤矣雖其立論辨析馳騁不如孔子之渾然簡易其不得已而救弊之辭故曰衰世之志也昔者孔子當三代盛時春秋亦不作也韓子曰孟子功不在禹下僕于程朱亦云足下又謂聖人復起果止此乎僕謂聖人復起亦不失其本心而已如其得位必將損益古今制禮樂正人心然六籍之大法不易也如不得位則亦如孔子之補殘缺存聖軌裁後學詔來世而已曽子子思孟子程朱之言有所不廢也故曰雖有其德苟無其位不敢作禮樂焉足下又謂聖人復起必不拘拘先大學次論孟次中庸次五經之誦讀而已僕謂聖人復起必用孔子教人之法必不置大學于一隅而别為法也必不先五經而後四書也必不先春秋而後詩書也必不先行而後知也故曰述而不作信而好古傅說亦曰事不師古匪說攸聞且就致知論之讀書亦無序乎譬之人生孩提而童童而冠冠而娶娶而仕自然之勢也孩提而冠則非禮童而娶則夭矣故子夏曰孰先傳焉孰後倦焉焉可誣也足下謂讀書者學者之一事斯言是也僕謂讀書者致知中之一事致知己不止此况致知為力行之地乎程子論此備矣然致知之始舍讀書又將焉務今禮樂壞矣射御書數又無其法處今之世者惟有循序讀書以明其理理明而後有以辨古人之得失察事物之是非而後可由敬恕以養本心也况禮樂既壞本心有不壞者乎大學所以先致知而後誠意者正以此也未有所知而欲行猶不知南而遊越不知北而遊燕也大學者指燕越之路者也若必待聖人復起制禮作樂而後學焉吾恐死而有不及也足下論朱陸之爭往往多陸少朱謂陸氏之徒躬行者衆朱子之徒辨論過多僕謂人當觀其理不當觀其迹傳曰尊德性而道問學夫尊德性誠意正心也道問學致知格物也就大學論之致知格物先也誠意正心後也道問學以為尊德性之地也陸氏之學舍問學而尊德性者也朱子之學尊德性而道問學者也生之者謂之自誠明學之者謂之自明誠陸氏之學欲自誠而明以聖自居而實不易至者也朱子之學自明而誠由學而至人所可及者也佛氏之說一悟即了儒者之說勞而後通也朱陸門人大略如此足下又謂周子太極無極之說端自佛老通書之語淺近甚多朱子釋太極强為斡旋僕謂此事可以心體難以口辨以心體當自得之以口辨則朱陸辨之詳矣不在畫蛇添足也足下謂程朱者時之所尚故吾之教人不得不然尤所未安也王安石曰時然而然衆人也已然而然君子也足下苟知程朱之謬當自為一法以教人可也教人者本諸心見諸體貌形諸議論懇懇而導之猶懼其不能諭况非其本心而姑從其說僕恐受業者疑其所從也僕與足下同此心者也足下好義樂善非好勝已者昔者之論其有激乎世之人上孔孟下程朱給談鋒衍辭藻如陸氏之為者尚少故也僕恐聞足下之言者將謂曽子子思孟子程朱不足學孔子生知又不易進德者終不得其門也鄙見如此足下幸終教之
