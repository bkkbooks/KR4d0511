body:
  text: 積齊集卷一元程端學撰賦陽燧賦惟皇建極兮龍德正中動無不敬兮伊郊祀其益隆犧牲潔粢盛美兮期鬼神之降假聚吾神以求合兮遂冥搜夫精賾惟火雖潔兮猶慊其或汙鑽木擊石兮與焚膏其奚殊仰扶光之赫赫兮曰衆陽之大宗蒼蒼不知其幾千萬仭兮蹇凌風而上羾念無形猶可致兮詎有形而莫假謂明鑑之有類兮允隂陽之所宅俟東方之既明兮拂晶光以相對孰謂霄漢之穹窿兮歘離明之交㑹其初孔微兮奄觸類而成燎既氣潔而燭明兮豈饌陳之僅照􅡒蕭燔柴以求陽靈兮寧舍兹而外取當辟公之助相兮照齊明之心膂至神莫能形容兮名之曰陽燧譬方諸之引明水兮可上池之同類余然後悟造化之妙合兮雖髙逺而無間洋洋昭布森列兮孰屋漏而不憚竊又疑夫火為五行之至妙兮必著物而生輝其起無從兮其戢無歸熹熹融融兮疇夫人之可言不與水同淆兮何前聖之文繁亦庶幾其來享兮廣吾敬之所極噫一物之尚然兮餘類推其可識皇天至公兮信無常而無親曰定命其有道兮齊一心而弗替祭必受福兮斂五福以敷錫銷舊染之汚濁兮煥大明於萬國菽粟如求水火兮上足下豐陽燧之火將與日並照六合兮夫豈囿一用以為功五言古詩題隱珠書院美玉常在山明珠常在淵兹山名隱珠誰能究其然我聞徑寸寶允在懷抱間寂寂若無迹神光翳幽𤣥時於酬酢處纍纍見根源有能自洗濯再使光明全明月照萬水在在同一圓長沙富才彥劉家世稱賢珍藏不自售結屋珠山巔講習資麗澤象物古有緣感興秦阡廢周井木鐸亦不鳴教養兩乖術義路何由興巨室力創帑貨賄縈厥情窮氓朝夕間長念饑寒并所以各有役躑躅坐待明輕重倘自決利機何由萌夀初翁先生喬松何亭亭層隂冒岡陵豈無霜與雪保此恆青青體性固應爾種養諒有成兔絲抱柔脆攀緣得深慿頗解借髙撡仰與嵗寒盟松底有流脂能作千年苓茹之填骨髓益我氣與精惠我倘弗祕共翁樂長生遊建平東湖題石磴春雨曉澄霽暄風媚芳物歡言命雙履聿來憩修竹茂林鬱葱芊煙雲時出沒一水下縈紆逺峯聳崒嵂嵗莫逺為客經春倦馳逐豈其得佳趣幽意淡自足暮歸沿春流輕風激商曲和笑翁先生種柏苖種柏不千嵗不與大厦收養此未盈尺君志何悠悠先生啞以笑此語非吾儔憐彼貞秀姿托根澗谷幽青陽不為春嚴霜不為秋秋來兩相對此意默自侔安得計日月坐待匠石求自侣林君子鎮日以優游遊赤山雲去天宇寬暄風吹襟裾聊携同心友披榛步郊墟季冬氣候溫芳類先敷舒初陽媚青柔寒梅薦芳華嵗晏百感集復此散煩紆頺然付一醉萬事皆雲如俯仰有餘樂不道非我居矧兹羣彥聚共此物外娛勤也瀟灑士淡與秋色俱謙也騏驥才燕越一馳驅嶽生敦敏姿淳哉真聖儒所以不辭酒醉舞郎溪途皇天走日月歘若過隙駒題陳氏子迎出母卷陳子壯有室不識慈母顔問人人不知寤寐成恫瘝一旦告之故轍跡窮人寰逆旅豈天授見母生得還人謂朱揚州情事遙相關禮變處世易處家良獨難世事義是適幹蠱恩義間循恩乖父志從義忍母患所以伋也子勉强棄蒯菅世聞朱陳事能不為澘澘送良能單子遊建平孟冬變時候雲黑天地寒單子將有適親賔集郊關執手不能别洟泗如奔湍我謂志士胸九有一視間此别不足惜所惜具慶年嚴父客千里慈母倚門歎處違嚴父候出逺慈母顔出處兩無得遲子趣迎還至孝不在約菽水成欣歡我生早孤獨欲養誰余餐以我養不時知子心靡安我有郎川兄歸計尚盤桓長念父事之庶以追往愆慿子一問訊為我陳肺肝倘同乃翁車彼此所願言贈安當之同年歸髙麗我家東海西君家東海東總是東海上海濶無由通我如海中雲君如海中龍雲龍以類應萬里終相從君才起賔興我愚亦叨蒙春官俱戰藝論心此時同人間豈無友文會情自隆去年别我去索居正忡忡今年倐來思詩酒聊從容奄忽復逺别離合無定踪還如雲與龍聚散八紘中相期齧氷蘖嵗寒以為功贈張御史歸髙麗皛皛遼海東旁礴萬餘里山髙水明麗儲精産瑰偉風俗本淳朴矧復化箕子張侯其巨擘丰姿嫓秋水走馬以朝君邂逅京城裏初覿已傾蓋再見心遂委酒酣忘爾汝我歌君洗耳綢繆未云久辭我歸故里客邉難為别悵悵成坐起我家東南陬相望去無幾他年歸故山許我航一葦雪中與李德針分韻得時字同雲蔽天地驚飈輔寒威奄忽萬籟歇雪花交橫飛仰矚未云久庭樹變華姿峨峨江南山晃晃眯所窺千里一渾浩蟾兔生晝輝却思去年日踏雪郎溪湄手携二三友興逸未言歸今我及二子亦復賞此竒心明滯吝融素懷默相宜因歌成短章聊用記兹時同謝彥實諸友飲江臯醉題秋江寫我心秋風吹我衣手携五六友浩飲秋江湄江月正皎皎興逸未言歸歌聲動秋濤白鷺參差飛送張得真歸湖南張生清慎士貌古心亦間落落寒澗松英英秋畹蘭三年遊太學一日當南還俯首前乞言庶以銘肺肝我謂聖與愚只在人已間人孰不問學無為良獨難耿耿方寸明實為萬化端尋常酬酢處仁義類魚貫聲色與臭味亂我耳目官神鑑一以昏是非方異觀所以夸奪子早夜徒嚾嚾爵祿有定命智力非所干氷蘗幸自愛願言同嵗寒劉損齊至建平次其韻劉公古豪士抱器當明時博識辨勞薪絶照逾然犀博士滯桐城用與材相違誰云懷印組終然丘壑姿六月即步見灑我以清颸且為十日遊未用輕語離大巖起東南鸞鳳爭騫飛南湖吞數州去此不町畦山川太白跡風物𤣥暉詩菰蒲中有人此語今豈非文章出西蜀作者久不支願為留賦詠大手非公誰出語勿過髙隨俗免嘲嗤乙丑初至江東精舍山主王豈巖寫示詩盈軸輒次首篇韻為謝蒼壁衛精舍輕霞冠崇搆門徑既威夷竹樹亦森秀前臨秦淮流後倚鍾山岫道講如砥矢學謹不徑竇髙堂奉宣尼兩廂來異茂澗溪虔米蘋尊爵嚴奠酎入者既得門而漸見美富主人造士心四教順時候顧我如爰居入耳眩金奏滿百不以聞豈但容其復即事呈伯勉天清露爽涿夜廊涼月上披衣出草堂忽聽風笛響俄然寸心明迤邐成孤賞遊東門分韻得半字太儀妙斡運忽忽春逾半頗聞集里彥川原縱竒觀憐我縈世紛淪迹乖勝踐却憶去年日亦得快兹玩嘉客或鼎來杖屨遂魚貫層巒屹巑岏澄湖浩瀰漫孤花媚幽薄晴宇翔飛翰髙情切天雲先後略童冠短章交唱和飛觴迭酬勸詠歸循故蹊頽陽渺沙岸重來已隔嵗俾我成感歎人生藐如寄嵗月急奔駻役役不自持毫釐異氷炭明發又東騖各在天一畔願言崇令德相期勤旦旦七言古詩和謝兄用東坡韻咏海棠先生宴坐如槁木手種閒花伴幽獨野人遺我西蜀春丰姿灑灑去塵俗一詩未及怪杜陵要畫不成惟鄭谷如何曽植上林花無端肯偎幽人屋曉疑猩血染紈綃晚看粉膩花奴肉山日髙懸朝露晞錦帳春酣睡未足可憐錯比玉環嬌玉環那得渠貞淑容柔避日俯長楊身輕怕風倚修竹眉山老子謝繁華也向籬間一偷目從知身是草木精天涯自憐同出蜀蜀人不記移根時將子翻疑鴻與鵠文彩却與花爭鮮拄杖看花自成曲明朝我欲躡舊蹤打起黃鸝莫相觸次李伯圭韻大椿千嵗為春秋人在瀛海之一州蟪蛄所知蠻觸爭得即歡欣失即愁羡子天放不受束外視聲利如粒粟南山隱几爽氣佳北忩髙枕清風足人間樂意熟此久我今作計未應後已將萬事付蕉鹿須臾夢覺復何有題鴈圗秋風颯颯吹黃蘆北鴈南飛參差呼原草風吹春復緑南鴈北歸聲肅肅十年馳騖京華塵每逢飛鴈生悲辛歸田却似倦飛翮浮鷗浴鷺相親狎乘興謾爾西江遊已覺一日如三秋誰奪天機作橫幅水清沙淺羣鴈宿豈無黃雀謀稻粱獨避寒暑空頡頑雪霜磔翼不改性飛遍江湖節逾徑喚起清夢繞故山髣佛扁舟前浦還五言律詩出建平西城雨後煙雲暖江南草木春看花非故里出郭已愁人日月催元髮乾坤浩客津如何蘇季子裘敝尚風塵送李丞知京兆司録才從知己薦公近以知己薦尉改官又應辟書行今知府天章孫待制辟公領是任廷尉官聨重軍謀職任清華嚴春野秀紫閣晚峯橫盡是供吟處歸應新集成次蔣菊徑韻老逾文力健筆陳掃千人留客囊從罄忘言意轉真花看籬菊日水憶帶湖春鳴鳳行軒翥飄飄不可親次粉場官陳澤雲韻江左官懷冷閩關客未還杯傾從白髮忩拓得青山朋友求三益文章見一斑台雲隨渡浙尚漬衣巾間次趙子山韻幽棲自成趣語默意俱真事業新吟富生涯舊食貧久知莊叟傲不汚庾公塵花竹看君種清隂已蔽人次馬伯庸少監韻四首帝德昭日月黎氓仰照臨扶光朝赫赫朔吹晚駸駸雨過川原淨雲生山谷深微臣願抒臆志不在腰金鄉國五千里江山幾萬重清宵聞擊柝大道不傳烽南客勞相問家書怕啓封才疏甘野鶴何意附雲龍吟身還倚馬歸夢托啼鵑僻學存書卷新愁附酒船文章誰賈董功業自閎顛白首從來往悠悠度嵗年端門開日月髙閣近星辰易簡陳前學從容屬近臣春秋差穀旦早晚致時巡比竹歌鳴鳳橫編贊畫麟和筠軒司徒題英皇御書韻鹵簿崇親祀風雲繞帝宸百年開禮樂萬感付臣民牀上琴空在書中墨更新不逢帷幄舊寧識聖恩淳寶笥開遺墨浮雲為我隂盤銘推盛德筆諫表貞心密有雷霆護明於日月臨史臣求聖製樂舊被新音補挽友仁先生程朱寥廓後夫子乃今生太極完心體三光借德明奉親須養志錫類必推誠若使天年夀應看集大成七言律詩賀劉父九十八夀身住崆峒已百年七朝冠蓋口能傳隱居謾作愚公計針警思齊衛武賢鶴髮奉觴皆弟姪綵衣繞膝半曽𤣥澆漓不變深淳俗疑是宣平别有天和趙山心先生墓所種松竹韻松竹栽於一代餘功勤定是過當初當初經理人供役今日封培手自鋤徑節便看凌嵗晚柔情已覺補雲疏此心即與山濤似就詔爭如爾隱居他日穹林百尺餘只今便是養根初良姿難長在自植惡莽易滋休廢鋤夫子無言能力踐狂生有志愧才疏願推此孝盡常性定得人心返故居次王常博韻馬蹄欵欵踏平沙宫樹修修留落霞靜照碧波千甲第逺依翠竹幾漁家西山呈秀雨初霽東郭生明月欲華更愛同逰盡才彥太平仍得見隨騧和李伯圭韻數間茅屋逺囂塵一曲清溪抱竹林碧水輕風春渙渙蒼藤翠靄晚沉沉殊方病久成愁喟髙閣鄉遙倦陟臨萬事無言唯一醉世無鍾子莫彈琴獨䇿青藜憩旅塵豈殊倦翼寄風林江湖多病青春莫鄉國無書雙鯉沉越嶲鶯花勞夢寐楚山燕雨蔽窺臨東南西北隔千里一曲離情寄玉琴山川路邈客無賴天地春回花滿林野甸鷾鴯雙上下晴川鸂鶒自浮沉思君永夜勞人夢何日髙樓把臂臨一醉濁醪忘世慮君歌我和無絃琴和皇甫子韻霜清碧海色幽幽宫樹風驚聲轉秋迷路阮生空自泣著書虞子謾多愁寄身朔漠黃塵暗極目西山爽氣浮世上功名何日了誰能真伴赤松遊九日喜敬叔兄自建平歸去年今日醉黃花君在郎川我在家今日兩人逢濁酒我當擊鋏君當歌門間秋老丹楓落天逺雲輕白鴈斜堂上雙親越强健共君不樂復如何秋風已放荒籬菊霜月初寒昨夜砧人事蕭條堪獨笑天時荏苒故相侵也知馮子餘長鋏尚愛楊生賤十金晝掩柴門對風雨一尊聊復得吾心和史躬父詠雪風雪交橫萬里吹郊原廓落絶禽飛亂堆銀粟天為廪遍織紈綃地作機百辟佩環朝玉帝五更閶闔啓瑶扉融成只是人間水際得窮隂偶發輝縱傳盈尺是豐年何用經旬沒野堧山失舊容疑改節石塗新粉學誇妍連空逺布魚麗陳滿目輕飛鵠白箋詩與滕神鬭竒巧我慚俚語續諸先和躬父對雪胍胍飛來不是塵輕輕堆作地中雲一身便踏廣寒殿百卉皆非下界春到處色同猜落鴈隔忩聲似折新筠誰能化作無窮粟活却饑年幾萬人次海月元戎嵗首喜雪韻呈理齊太守元旦迎春喜嵗逢瑶華連日雨雲同廣寒宫殿元無夜姑射仙人本御風破竹威聲驚屈節學梅清白故縈叢閉門豈必皆髙臥履迹端能得固窮和韻暮春風物恰初三江水不流如碧潭多病瘦軀猶短褐誰家蕩子已輕衫人間勛業皆魂夢身後聲名等笑談得酒便堪酬美景流觴陳迹不須探麗人兩雨挾三三笑祓羅裙俯碧潭紒重不知頻舉手身輕渾欲不勝衫精神洛水聊容與雲雨巫山接笑談此色染人難禊祓柳邊回首莫深探綿綿芳草隨意緑艷艷嬌紅轉眼非林鳩自喚白日靜柳花輕逐春雲飛皂帽管寧誰得似敝裴季子未知歸破琴絶絃亦何益有道不愁知者稀楊花輕盈飄蕩失因依遍繞郊園及草池却似鵝毛初退氄僅如蠶絮不成絲暫飛須倚狂風勢髙舞寧思落地時吹盡殘紅遊子倦此花猶自費人詩和筠軒司徒韻心在山林迹在朝爐香散作白雲遙春生渭北空懷舊秋到淮南待返招梵宇千年天闕近行宫五月雪花飄下帷盡日無餘事珠玉時來慰泬寥次韻秋山春日感興青鬢才郎感興深醉於馬上得新吟一年臘盡人迎節三畫陽生卦轉臨甲第對梅香病骨辛盤分菜雪塵襟大材用晚何嫌老看取槃槃樹百尋送縣令三年相望隔燕雲逆旅青燈喜暫親墨綬又分淮甸雨朱衣行照錦城春弦歌教化行君志鞍轡追隨愧我身茹蘖啜氷須自愛男兒事業豈憂貧和雨中牡丹醉舞霓裳采戰酣汗香隨髻倚朱簷紫瓊杯淺流霞溢黃錦裙低薄露沾相别馬嵬揮粉淚自羞飛燕下珠簾想嫌虢國逞嬌素洗却胭脂對玉奩喜黃彥實歸次其韻江南文獻屬君家自喜論交得棣華問訊每曽慿越客相思幾度見江花共君今日酒須醉恨我空山蕨未芽人物風流有如此肯將年嵗老煙霞次蔣菊徑韻擬同登陸向東遊憶弟看雲五見秋鄴架幸存書萬卷李洲思種橘千頭羡君入院衆方歎有子持家百不憂交割帶湖鷗好在三年端的為渠留次天台夏見山見贈韻二首先生經學繼馮程早嵗驅馳已有聲致澤未嘗忘此世行藏端欲守遺經非緣藜藿真堪戀久信熊魚不得并澗底長松君莫歎百年直節保青青離鄉恐作橘為枳較德何殊菌與椿性懶不嫌官况冷才疏還喜士風淳尚慚孔禰忘年友敢說朱陳纍世親尊酒詩篇莫相放南湖風物總回春李伯圭過客舍留飲辱詩酒酣次韻濁酒林間春日長垂楊屋外碧雲涼郫筒滿眼亦可醉野客樂意未渠央舊友千里夢頭白征衣三嵗化塵黃垂弧已有四方志男子隨時為弛張伯圭用韻再賦再次韻水會江漢西去長地鄰淮甸春猶涼羈棲客情亦堪歎遊歷逺興殊未央濁酒澆腸天地濶晴楊弄日川原黃丈夫多愁豈貧賤斂翮三年思奮張屋外土塉難栽蔬門前路細不通車樹雲蒼茫崇山合煙火蕭然樵子居巖靜秋清聞落木溪澄日出見遊魚經年世事豈相絆此日塵襟得暫舒次伯圭韻驚心嵗月悲長路照眼花枝發近林司馬山川倦遊歷爰絲閭里與浮沉故園為主貧還樂華髮催人老易侵會把驅馳揮汗手便歸振撥舊牀琴次伯圭見寄韻去嵗倉忙買棹還離尊爛醉盡君歡看梅踏雪餘寒在燒燭傳杯向夜闌暫慰飄蓬歸甬水豈知行李得綏安故人佳句先持贈論報慚無雙玉盤史躬父諸公有南湖之遊病中不與因見寄題焉愛汝春郭樓閣逈更有花鳥爭紛紜花臨漣漪影自照鳥隔葱蒨聲相聞清江見底浴日月碧天無際走風雲抱疴羡子得此樂何當相與窮朝曛五言絶句題墨梅明月照寒潭疏影弄清碧一枝江南春百年不改色和孫友仁韻明月麗中天幽情與誰賞何人吹玉簫夜靜聞孤響六言絶句題史信父小梅萬竹亂堆蒼玉雙梅冷薦清馥老松髙聳孤青野水春生浮緑逺嶂浮嵐欲曙幽鳥引雛亭午斜陽隔竹人聲半夜一林風雨晨興謾理琴書晚景閒寄翰墨客來對酒髙歌興逸憑欄騁目小梅物意無窮寓我平生有足從他人事翻輪且對天開橫幅七言絶句和間間吳上卿題筠軒齊踵門奕奕萬車徒一曲瑶琴一卷書腸胃近來清似洗寄身朝市即林居清才如許值明時却把間身寄托題百事盡收空似鏡窗前破寂一聲雞山行還次劉梅泉水繞孤村天地寬蕭然秋色老柴關白雲滿谷孤猿嘯黃草連天一鴈還霜落天髙野月寒髙秋爽氣薄林關商歌一曲不知處應是漁樵清夜還和題台州方廣寺應詔畫圗瀑布聲中隱約聽鐘聲欲出翠嵐凝也知地氣靈如此空現樓臺千萬層水激成鐘髣佛聽樓臺暫在眼中凝要圗寶跡歸天子須過危橋踏幾層圗裏鐘聲曷可聽架空樓閣不長凝李成再使生今日樓閣何知畫幾層
